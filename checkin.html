<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출근 체크</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="checkin-page">
    <div class="card" style="width: 100%; max-width: 400px;">

      <!-- 토큰 인증 모드 (등록된 기기) -->
      <div id="tokenSection" style="display: none;">
        <div class="logo">📋</div>
        <h1>출근 체크</h1>
        <div class="token-user-info">
          <span class="token-badge">자동 인증</span>
          <div class="token-empid" id="tokenEmpId"></div>
        </div>

        <button class="btn btn-primary" onclick="doCheckin()">
          출근
        </button>
      </div>

      <!-- 사번 입력 모드 (최초 등록) -->
      <div id="formSection">
        <div class="logo">📋</div>
        <h1>출근 체크</h1>

        <div class="form-group">
          <label class="label">사번 입력</label>
          <input
            type="tel"
            id="empId"
            class="input-field"
            placeholder="0000000"
            maxlength="10"
            inputmode="numeric"
            autocomplete="off"
          >
        </div>

        <button class="btn btn-primary" id="checkinBtn" onclick="doCheckin()">
          출근
        </button>

        <p id="errorMsg" style="color: #dc2626; margin-top: 12px; font-size: 14px; display: none;"></p>
      </div>

      <!-- 로딩 -->
      <div id="loadingSection" style="display: none;">
        <div class="spinner show"></div>
        <p style="color: #6b7280; margin-top: 16px;">처리 중...</p>
      </div>

      <!-- 성공 결과 -->
      <div id="successSection" class="result">
        <div class="result-icon">✅</div>
        <div class="result-message">출근 완료</div>
        <div class="result-time" id="resultTime">08:42</div>
        <div class="result-detail" id="resultDetail"></div>
      </div>

      <!-- 실패 결과 -->
      <div id="errorSection" class="result result-error">
        <div class="result-icon">❌</div>
        <div class="result-message" id="errorTitle">QR이 만료되었습니다</div>
        <div class="result-detail">태블릿의 QR을 다시 스캔해주세요</div>
        <button class="btn btn-primary" style="margin-top: 24px;" onclick="location.reload()">
          다시 시도
        </button>
      </div>

    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/totp.js"></script>
  <script src="js/checkin.js"></script>
</body>
</html>
