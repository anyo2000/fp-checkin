<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출근 체크</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="checkin-page">
    <div class="card" style="width: 100%; max-width: 400px;">

      <!-- 토큰 인증 모드 (등록된 기기) -->
      <div id="tokenSection" style="display: none;">
        <div class="logo">📋</div>
        <h1>출근 체크</h1>
        <div class="token-user-info">
          <span class="token-badge">자동 인증</span>
          <div class="token-empname" id="tokenEmpName"></div>
        <div class="token-empid" id="tokenEmpId"></div>
        </div>

        <button class="btn btn-primary" onclick="doCheckin()">
          출근
        </button>
      </div>

      <!-- 사번 입력 모드 (최초 등록) -->
      <div id="formSection">
        <div class="logo">📋</div>
        <h1>출근 체크</h1>

        <div class="form-group">
          <label class="label">사번 입력</label>
          <input
            type="tel"
            id="empId"
            class="input-field"
            placeholder="0000000"
            maxlength="10"
            inputmode="numeric"
            autocomplete="off"
          >
        </div>

        <div class="form-group">
          <label class="label">이름</label>
          <input
            type="text"
            id="empName"
            class="input-field"
            placeholder="홍길동"
            maxlength="10"
            autocomplete="off"
            style="letter-spacing: normal;"
          >
        </div>

        <button class="btn btn-primary" id="checkinBtn" onclick="doCheckin()">
          출근
        </button>

        <p id="errorMsg" style="color: #dc2626; margin-top: 12px; font-size: 14px; display: none;"></p>
      </div>

      <!-- 등록 정보 확인 (최초 등록 시) -->
      <div id="confirmSection" style="display: none;">
        <div class="logo">📋</div>
        <h1>등록 정보 확인</h1>
        <div style="background:#f8fafc; border-radius:12px; padding:20px; margin:16px 0; text-align:left;">
          <div style="margin-bottom:12px;">
            <span style="font-size:13px; color:#6b7280;">사번</span>
            <div id="confirmEmpId" style="font-size:20px; font-weight:700; letter-spacing:2px;"></div>
          </div>
          <div>
            <span style="font-size:13px; color:#6b7280;">이름</span>
            <div id="confirmEmpName" style="font-size:20px; font-weight:700;"></div>
          </div>
        </div>
        <p style="font-size:14px; color:#854d0e; margin-bottom:16px;">위 정보가 맞는지 확인해주세요.<br>등록 후에는 변경이 어렵습니다.</p>
        <div style="display:flex; gap:8px;">
          <button class="btn" onclick="cancelConfirm()" style="flex:1; background:#e5e7eb; color:#333; font-size:16px; padding:14px;">수정</button>
          <button class="btn btn-primary" onclick="doCheckinConfirmed()" style="flex:2; font-size:16px; padding:14px;">확인 후 출근</button>
        </div>
      </div>

      <!-- 로딩 -->
      <div id="loadingSection" style="display: none;">
        <div class="spinner show"></div>
        <p style="color: #6b7280; margin-top: 16px;">처리 중...</p>
      </div>

      <!-- 성공 결과 -->
      <div id="successSection" class="result">
        <div class="result-icon">✅</div>
        <div class="result-message">출근 완료</div>
        <div class="result-time" id="resultTime">08:42</div>
        <div class="result-detail" id="resultDetail"></div>
      </div>

      <!-- 실패 결과 -->
      <div id="errorSection" class="result result-error">
        <div class="result-icon">❌</div>
        <div class="result-message" id="errorTitle">QR이 만료되었습니다</div>
        <div class="result-detail">태블릿의 QR을 다시 스캔해주세요</div>
        <button class="btn btn-primary" style="margin-top: 24px;" onclick="location.reload()">
          다시 시도
        </button>
      </div>

    </div>
  </div>

  <script src="js/config.js?v=2.1"></script>
  <script src="js/totp.js?v=2.1"></script>
  <script src="js/checkin.js?v=2.1"></script>
</body>
</html>
